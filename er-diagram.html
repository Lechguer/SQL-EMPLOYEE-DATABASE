<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ER Diagram — SQL Employee Database</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --card: #1c2030;
    --border: #2a3045;
    --border-bright: #3d4f72;
    --text: #e2e8f8;
    --muted: #7a8aaa;
    --accent-blue: #4f8ef7;
    --accent-teal: #2dd4bf;
    --accent-purple: #a78bfa;
    --accent-amber: #fbbf24;
    --pk: #fbbf24;
    --fk: #2dd4bf;
    --line: #3d4f72;
  }

  body {
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  /* Header */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: rgba(13,15,20,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .logo span { color: var(--accent-blue); }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent-blue); color: var(--text); }

  .zoom-display {
    font-size: 11px;
    color: var(--muted);
    min-width: 42px;
    text-align: center;
  }

  /* Legend */
  .legend {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 100;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-title {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    color: var(--muted);
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .hint {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 100;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.8;
  }

  /* Canvas */
  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    cursor: grab;
  }
  #canvas.grabbing { cursor: grabbing; }

  /* SVG table cards */
  .table-group { cursor: grab; }
  .table-group:active { cursor: grabbing; }
  .table-group.dragging { filter: drop-shadow(0 12px 40px rgba(79,142,247,0.25)); }

  .table-header { cursor: grab; }

  /* Relationship line labels */
  .rel-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    fill: var(--muted, #7a8aaa);
  }

  /* Dot grid background */
  #dot-grid { pointer-events: none; }
</style>
</head>
<body>

<header>
  <div class="logo">SQL <span>EMPLOYEE</span> DB — ER Diagram</div>
  <div class="controls">
    <button class="btn" onclick="zoomOut()">−</button>
    <span class="zoom-display" id="zoom-label">100%</span>
    <button class="btn" onclick="zoomIn()">+</button>
    <button class="btn" onclick="resetView()">Reset</button>
  </div>
</header>

<div class="hint">
  🖱 Drag canvas to pan<br>
  🃏 Drag cards to reposition<br>
  🔍 Scroll to zoom
</div>

<div class="legend">
  <div class="legend-title">Legend</div>
  <div class="legend-row"><div class="legend-dot" style="background:#fbbf24"></div> Primary Key (PK)</div>
  <div class="legend-row"><div class="legend-dot" style="background:#2dd4bf"></div> Foreign Key (FK)</div>
  <div class="legend-row"><div class="legend-dot" style="background:#7a8aaa"></div> Regular field</div>
  <div class="legend-row" style="margin-top:8px;">
    <svg width="36" height="12" viewBox="0 0 36 12">
      <line x1="0" y1="6" x2="36" y2="6" stroke="#4f8ef7" stroke-width="1.5" stroke-dasharray="4 3"/>
    </svg>
    Relationship
  </div>
</div>

<script>
  // ─── State ───
  const world = document.getElementById('world');
  const canvas = document.getElementById('canvas');
  let pan = { x: 0, y: 0 };
  let scale = 1;

  // Table positions (relative to world origin)
  const positions = {
    'tbl-department': { x: 80, y: 120 },
    'tbl-job':        { x: 80, y: 380 },
    'tbl-employee':   { x: 440, y: 100 },
  };

  // Table dimensions
  const dims = {
    'tbl-department': { w: 240, h: 182 },
    'tbl-job':        { w: 240, h: 198 },
    'tbl-employee':   { w: 268, h: 428 },
  };

  // ─── Apply world transform ───
  function applyTransform() {
    world.setAttribute('transform', `translate(${pan.x},${pan.y}) scale(${scale})`);
    document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
  }

  // ─── Relationship line drawing ───
  function midpoint(ax, ay, bx, by) {
    return [(ax + bx) / 2, (ay + by) / 2];
  }

  function tableCenter(id) {
    const p = positions[id], d = dims[id];
    return { x: p.x + d.w / 2, y: p.y + d.h / 2 };
  }

  function tableEdgePoint(id, toX, toY) {
    const p = positions[id], d = dims[id];
    const cx = p.x + d.w / 2, cy = p.y + d.h / 2;
    const dx = toX - cx, dy = toY - cy;
    const angle = Math.atan2(dy, dx);
    // find intersection with rect edges
    const hw = d.w / 2, hh = d.h / 2;
    let ex, ey;
    if (Math.abs(Math.cos(angle) * hh) > Math.abs(Math.sin(angle) * hw)) {
      // left/right edge
      ex = cx + (dx > 0 ? hw : -hw);
      ey = cy + Math.tan(angle) * (dx > 0 ? hw : -hw);
    } else {
      // top/bottom edge
      ey = cy + (dy > 0 ? hh : -hh);
      ex = cx + (dy > 0 ? hh : -hh) / Math.tan(angle);
    }
    return { x: ex, y: ey };
  }

  function drawLines() {
    // DEPARTMENT → EMPLOYEE (DepartmentID)
    const dc = tableCenter('tbl-department');
    const ec = tableCenter('tbl-employee');
    const de = tableEdgePoint('tbl-department', ec.x, ec.y);
    const ee = tableEdgePoint('tbl-employee', dc.x, dc.y);
    const dmx = (de.x + ee.x) / 2, dmy = (de.y + ee.y) / 2;

    document.getElementById('path-dept-emp').setAttribute('d',
      `M${de.x},${de.y} C${(de.x+ee.x)/2},${de.y} ${(de.x+ee.x)/2},${ee.y} ${ee.x},${ee.y}`);
    positionLabel('lbl-dept-emp-1', de.x + 10, de.y - 10, '1');
    positionLabel('lbl-dept-emp-2', ee.x - 10, ee.y - 10, 'N');

    // JOB → EMPLOYEE (JobID)
    const jc = tableCenter('tbl-job');
    const ec2 = tableCenter('tbl-employee');
    const je = tableEdgePoint('tbl-job', ec2.x, ec2.y);
    const ej = tableEdgePoint('tbl-employee', jc.x, jc.y);

    document.getElementById('path-job-emp').setAttribute('d',
      `M${je.x},${je.y} C${(je.x+ej.x)/2},${je.y} ${(je.x+ej.x)/2},${ej.y} ${ej.x},${ej.y}`);
    positionLabel('lbl-job-emp-1', je.x + 10, je.y - 10, '1');
    positionLabel('lbl-job-emp-2', ej.x - 10, ej.y + 12, 'N');

    // EMPLOYEE → EMPLOYEE self-ref (ManagerID)
    const p = positions['tbl-employee'], d = dims['tbl-employee'];
    const sx = p.x + d.w, sy = p.y + 80; // exits right side near top FK
    const ex2 = p.x + d.w, ey2 = p.y + 320; // enters right side near ManagerID
    document.getElementById('path-self').setAttribute('d',
      `M${sx},${sy} C${sx + 70},${sy} ${ex2 + 70},${ey2} ${ex2},${ey2}`);
    positionLabel('lbl-self', sx + 56, (sy + ey2) / 2, 'manages (self)');
  }

  function positionLabel(id, x, y, text) {
    const el = document.getElementById(id);
    el.setAttribute('x', x);
    el.setAttribute('y', y);
    el.textContent = text;
  }

  drawLines();

  // ─── Canvas pan ───
  let isPanning = false, panStart = { x: 0, y: 0 };

  canvas.addEventListener('mousedown', e => {
    if (e.target.closest('.table-group')) return;
    isPanning = true;
    panStart = { x: e.clientX - pan.x, y: e.clientY - pan.y };
    canvas.classList.add('grabbing');
  });

  window.addEventListener('mousemove', e => {
    if (!isPanning) return;
    pan.x = e.clientX - panStart.x;
    pan.y = e.clientY - panStart.y;
    applyTransform();
  });

  window.addEventListener('mouseup', () => {
    isPanning = false;
    canvas.classList.remove('grabbing');
  });

  // ─── Zoom ───
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    // zoom toward cursor
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    pan.x = mx - (mx - pan.x) * delta;
    pan.y = my - (my - pan.y) * delta;
    scale = Math.min(3, Math.max(0.25, scale * delta));
    applyTransform();
  }, { passive: false });

  function zoomIn()  { scale = Math.min(3, scale * 1.2);  applyTransform(); }
  function zoomOut() { scale = Math.max(0.25, scale * 0.8); applyTransform(); }
  function resetView() { pan = { x: 0, y: 0 }; scale = 1; applyTransform(); drawLines(); }

  // ─── Table dragging ───
  document.querySelectorAll('.table-group').forEach(tbl => {
    let dragging = false, startMouse = {}, startPos = {};

    tbl.addEventListener('mousedown', e => {
      e.stopPropagation();
      dragging = true;
      startMouse = { x: e.clientX, y: e.clientY };
      startPos = { ...positions[tbl.id] };
      tbl.classList.add('dragging');
    });

    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const dx = (e.clientX - startMouse.x) / scale;
      const dy = (e.clientY - startMouse.y) / scale;
      positions[tbl.id].x = startPos.x + dx;
      positions[tbl.id].y = startPos.y + dy;
      tbl.setAttribute('transform', `translate(${positions[tbl.id].x},${positions[tbl.id].y})`);
      drawLines();
    });

    window.addEventListener('mouseup', () => {
      dragging = false;
      tbl.classList.remove('dragging');
    });
  });

  // Initial pan to center nicely
  pan = { x: window.innerWidth * 0.08, y: 60 };
  applyTransform();
</script>
</body>
</html>
